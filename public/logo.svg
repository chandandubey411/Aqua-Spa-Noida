<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aquaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0077B6" />
      <stop offset="50%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#90E0EF" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166" />
      <stop offset="100%" stop-color="#F2A65A" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (soft luxury glow) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#aquaGrad)" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.6"/>

  <!-- Lotus & Water Drop Design -->
  <g transform="translate(0, 2)" filter="url(#glow)">
    <!-- Outer Petals (Aqua/Blue Gradient) -->
    <path d="M50 72 C32 67 22 52 32 37 C39 50 46 62 50 72 Z" fill="url(#aquaGrad)" opacity="0.85"/>
    <path d="M50 72 C68 67 78 52 68 37 C61 50 54 62 50 72 Z" fill="url(#aquaGrad)" opacity="0.85"/>
    
    <!-- Inner Petals (Teal/Cyan) -->
    <path d="M50 72 C37 62 32 47 42 32 C47 44 49 57 50 72 Z" fill="url(#aquaGrad)"/>
    <path d="M50 72 C63 62 68 47 58 32 C53 44 51 57 50 72 Z" fill="url(#aquaGrad)"/>

    <!-- Center Water Drop Petal (Gold Accent) -->
    <path d="M50 72 C43 57 43 42 50 26 C57 42 57 57 50 72 Z" fill="url(#goldGrad)"/>
    
    <!-- Central Glowing Core (Water drop shine) -->
    <path d="M50 37 C47 47 47 57 50 67 C53 57 53 47 50 37 Z" fill="#FFFFFF" opacity="0.65"/>
    <circle cx="50" cy="44" r="2" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Bottom Waves -->
  <path d="M26 80 Q50 72 74 80" fill="none" stroke="url(#aquaGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M32 85 Q50 79 68 85" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
</svg>
